services:
  media:
    image: bluenviron/mediamtx:1.9.3
    restart: unless-stopped
    ports:
      - "1935:1935"
    expose:
      - "8888"
    volumes:
      - ./infra/mediamtx.yml:/mediamtx.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      KODA_HOST: 0.0.0.0
      KODA_PORT: 8080
      KODA_CORS_ORIGIN: https://${APP_DOMAIN}
      KODA_MEDIA_RTMP_BASE_URL: rtmp://${INGEST_DOMAIN}:1935/live
      KODA_MEDIA_HLS_BASE_URL: https://${PLAY_DOMAIN}/live
      KODA_DB_PATH: /app/data/koda.db
    volumes:
      - koda_data:/app/data
    depends_on:
      media:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_BACKEND_WS_URL: wss://${API_DOMAIN}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_HTTP_URL: https://${API_DOMAIN}
      NEXT_PUBLIC_BACKEND_WS_URL: wss://${API_DOMAIN}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  proxy:
    image: caddy:2.8.4
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      media:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      PLAY_DOMAIN: ${PLAY_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  koda_data:
  caddy_data:
  caddy_config:
